plugins: [jekyll-paginate]
collections:
  authors:
    output: true
defaults:
  - scope:
      path: ""
      type: "authors"
    values:
      layout: "author" 
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"
paginate: 2
paginate_path: "page:num"
permalink: /:categories/:title/
#plugins: [jekyll-paginte]
